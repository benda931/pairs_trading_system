name: CI

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements if present
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Syntax check (compileall)
        run: python -m compileall .

  production-safety-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run production safety pytest suite
        run: >
          python -m pytest
          tests/test_pair_utils.py
          tests/test_config_manager_paths.py
          tests/test_config_manager_mutation.py
          tests/test_orchestrator_pair_parsing.py
          tests/test_data_freshness.py
          tests/test_orchestrator_freshness_gate.py
          tests/test_allocation_guard.py
          tests/test_execution_safety.py
          tests/test_feedback_dry_run.py
          tests/test_promote_pairs_to_production.py
          tests/test_state_provider.py
          tests/test_agent_feedback.py
          -q
